# Small-budget run: ~30 generations, good for testing
max_evaluation_jobs: 1
max_proposal_jobs: 1
max_db_workers: 2

evo_config:
  num_generations: 30
  init_program_path: "initial.py"
  results_dir: null          # auto-generated per run
  language: "python"
  llm_models:
    - "claude-sonnet-4-6"
  patch_types: ["diff", "full"]
  patch_type_probs: [0.7, 0.3]
  max_patch_resamples: 3
  max_patch_attempts: 2
  embedding_model: null
  meta_rec_interval: null

db_config:
  num_islands: 2
  archive_size: 20
  num_archive_inspirations: 2
  num_top_k_inspirations: 1
  parent_selection_strategy: "weighted"
  migration_interval: 10
  migration_rate: 0.1
