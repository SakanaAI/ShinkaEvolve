# Real Estate Scorer — ShinkaEvolve config (small/dev run)
max_evaluation_jobs: 2
max_proposal_jobs: 2
max_db_workers: 2

db_config:
  num_islands: 1
  archive_size: 20
  elite_selection_ratio: 0.3
  num_archive_inspirations: 1
  num_top_k_inspirations: 1
  migration_interval: 10
  migration_rate: 0.1
  island_elitism: true
  enforce_island_separation: true
  parent_selection_strategy: weighted
  parent_selection_lambda: 10
  archive_selection_strategy: "crowding"
  island_selection_strategy: equal
  archive_criteria:
    combined_score: 1.0
    loc: -0.3
  enable_dynamic_islands: true
  stagnation_threshold: 5
  island_spawn_strategy: "best"
  island_spawn_subtree_size: 2

evo_config:
  patch_types:
    - diff
    - full
    - cross
  patch_type_probs:
    - 0.6
    - 0.3
    - 0.1
  num_generations: 10
  max_api_costs: 0.3
  max_patch_resamples: 3
  max_patch_attempts: 2
  max_novelty_attempts: 2
  job_type: local
  language: python
  llm_models:
    - "gemini-3-flash-preview"
    - "gpt-5.4-mini"
    - "gpt-5.4-nano"
  llm_kwargs:
    temperatures:
      - 0
      - 0.5
      - 1.0
    reasoning_efforts:
      - low
      - medium
      - high
    max_tokens: 16384
  meta_rec_interval: 5
  meta_llm_models:
    - gpt-5.4-mini
  meta_llm_kwargs:
    temperatures:
      - 0
    max_tokens: 8192
  embedding_model: text-embedding-3-small
  code_embed_sim_threshold: 0.99
  novelty_llm_models:
    - gpt-5.4-nano
  novelty_llm_kwargs:
    temperatures:
      - 0
  init_program_path: initial.py
  llm_dynamic_selection: ucb1
  llm_dynamic_selection_kwargs:
    exploration_coef: 1.0
    cost_aware_coef: 0.7
  results_dir: results/results_real_estate_scorer
  evolve_prompts: true
  prompt_evolution_interval: 5
  prompt_patch_types: ["diff", "full"]
  prompt_patch_type_probs: [0.5, 0.5]
  prompt_archive_size: 10
  prompt_percentile_recompute_interval: 1
  prompt_ucb_exploration_constant: 2.0
  prompt_epsilon: 0.25
